# configs/f1_base.yaml
# Memory-optimised for M4 MacBook Air 16 GB

data:
  data_root: "/kaggle/working/drivaernet_tiny"
  max_vertices: 50000
  rho: 1.225
  U_inf: 83.33
  L_ref: 4.6

model:
  in_channels: 4
  # Narrowed to keep peak kernel tensor (E, C_out, C_in) under 1 GB:
  # E ≈ 150k (directed only), C_max = 32, so 150k × 32 × 32 × 4B = 614 MB
  layer_types:
    - [8,  2]
    - [16,  2]
    - [32, 2]
    - [32, 2]
    - [32, 1]
    - [16, 1]
  max_freq: 2.  # to reduce memory, we limit to ρ₀, ρ₁, ρ₂ (scalar + vector + 2nd order) — no higher frequencies
  nonlin_samples: 5 # was 7 — reduce for memory, but still enough to capture nonlinearity
  head_dropout: 0.1
  break_symmetry_final: true

# training:
#   epochs: 100
#   batch_size: 1
#   lr: 1.0e-3
#   weight_decay: 1.0e-4
#   lr_patience: 5
#   lr_factor: 0.5
#   min_lr: 1.0e-6
#   grad_clip: 1.0
#   loss_weights:
#     cp:  1.0
#     wss: 1.0
#     cd:  10.0
#     cl:  10.0
#   loss_type:
#     cp:  "mse"
#     wss: "mse"
#     cd:  "l1"
#     cl:  "l1"
#   checkpoint_dir: "runs/"
#   log_every: 10

training:
  epochs: 50
  batch_size: 1
  lr: 3.0e-4          # was 1e-3 — lower LR is critical with 20 samples
  # weight_decay: 1.0e-4
  # lr_patience: 8       # was 5 — give it more time before decay
  # lr_factor: 0.5
  weight_decay: 0.0      # disable regularisation for overfit test
  lr_patience: 20        # don't decay LR during short test
  lr_factor: 0.5
  min_lr: 1.0e-6
  grad_clip: 1.0
  loss_weights:
    cp:  1.0      # standardised, std=1 → loss≈1.0 when predicting mean
    wss: 1.0      # standardised, std=1 → loss≈1.0 when predicting mean
    cd:  0.1      # low variance, L1≈0.01 → 0.1×0.01=0.001 contribution
    cl:  0.0      # disable entirely — not in this dataset
    # cp:  2.0           # was 1.0 — boost per-vertex signal
    # wss: 2.0           # was 1.0 — boost per-vertex signal
    # cd:  1.0           # was 10.0 — massive reduction, stops collapse
    # cl:  1.0           # was 10.0 — same
  loss_type:
    cp:  "mse"
    wss: "mse"
    cd:  "l1"
    cl:  "l1"

eval:
  checkpoint: "/kaggle/working/GDL_Cars/runs/best.pt"
  output_dir: "/kaggle/working/GDL_Cars"
  save_vtk: true


