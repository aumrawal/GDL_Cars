# configs/f1_base.yaml

data:
  data_root: "/kaggle/working/drivaernet_real"
  max_vertices: 50000
  rho: 1.225
  U_inf: 83.33
  L_ref: 5.0

model:
  in_channels: 9
  layer_types:
    - [16, 2]
    - [16, 2]
    - [24, 2]
    - [32, 1]
    - [16, 1]
  max_freq: 2
  nonlin_samples: 5
  head_dropout: 0.1
  cd_head_dropout: 0.5
  break_symmetry_final: true

training:
  epochs: 30
  batch_size: 1
  lr: 1.0e-3
  weight_decay: 0.0
  T_0: 50
  T_mult: 2
  min_lr: 1.0e-6
  grad_clip: 1.0
  checkpoint_dir: "/kaggle/working/GDL_Cars/runs/"
  log_every: 10
  loss_weights:
    cp:  1.0
    wss: 1.0
    cd:  0.1
    cl:  0.0
  loss_type:
    cp:  "huber"
    wss: "huber"
    cd:  "mse"
    cl:  "l1"

eval:
  checkpoint: "/kaggle/working/GDL_Cars/runs/best.pt"
  output_dir: "/kaggle/working/GDL_Cars"
  save_vtk: true
